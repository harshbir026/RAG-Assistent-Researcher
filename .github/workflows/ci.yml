name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-mock ruff

      - name: Lint with ruff
        run: ruff check . || true

# Tests marked 'requires_chromadb' need a populated vector store, which isn't
      # available in a fresh CI checkout (data/chroma_db/ is gitignored). They run
      # locally against the real 251-paper corpus but are skipped in CI.
      - name: Run tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: pytest tests/ -v --tb=short -m "not requires_chromadb"
